<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Ino.digital | HD Ultra Boost</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; position: fixed; overscroll-behavior-y: none; }

        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding-bottom: 140px; }
        .app-card { text-align: center; width: 90%; max-width: 320px; }
        .logo-img { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #bc13fe; box-shadow: 0 0 20px #bc13fe; margin-bottom: 15px; cursor: pointer; }
        h2 { font-weight: 900; letter-spacing: 2px; margin: 0; font-size: 1.3rem; }
        .tag { color: #444; font-size: 10px; letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase; }

        /* UPLOAD & PROGRESS */
        .upload-box { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 12px; position: relative; }
        .btn-up { background: #bc13fe; color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 900; margin-top: 10px; cursor: pointer; transition: 0.3s; }
        .btn-up:disabled { background: #222 !important; color: #555; cursor: not-allowed; }
        .btn-dl-final { background: #bc13fe !important; box-shadow: 0 0 20px rgba(188, 19, 254, 0.6); animation: pulse 2s infinite; }

        #prog-cont { width: 100%; height: 6px; background: #111; border-radius: 10px; margin-top: 15px; display: none; overflow: hidden; }
        #prog-bar { width: 0%; height: 100%; background: #bc13fe; box-shadow: 0 0 10px #bc13fe; transition: 0.3s; }
        #prog-txt { font-size: 10px; color: #bc13fe; font-weight: 700; margin-top: 8px; display: none; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* FOOTER */
        footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px 0; background: #000; text-align: center; border-top: 1px solid #111; z-index: 100; }
        .copy-neon { color: #bc13fe; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .footer-links { display: flex; justify-content: center; gap: 20px; }
        .legal-link { color: #444; font-size: 9px; font-weight: 700; text-transform: uppercase; cursor: pointer; }

        /* SUPPORT */
        .btn-cs { position: fixed; bottom: 90px; right: 20px; background: #bc13fe; color: #fff; padding: 10px 18px; border-radius: 50px; font-weight: 900; font-size: 10px; z-index: 50; }
        #notif-dot { position: absolute; top: -5px; right: 0; width: 12px; height: 12px; background: red; border-radius: 50%; border: 2px solid #000; display: none; }

        /* CHAT DRAWER */
        #ov { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1000; }
        #dw { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background: #080808; border-top: 2px solid #bc13fe; border-radius: 20px 20px 0 0; z-index: 1001; transform: translateY(100%); transition: 0.3s; display: flex; flex-direction: column; }
        #dw.active { transform: translateY(45vh); } #dw.full { transform: translateY(0); }
        .handle { width: 100%; height: 35px; display: flex; justify-content: center; align-items: center; }
        .line { width: 35px; height: 4px; background: #333; border-radius: 10px; }
        .logs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 12px; max-width: 80%; }
        .m-u { align-self: flex-end; background: #bc13fe; color: #fff; border-bottom-right-radius: 2px; }
        .m-a { align-self: flex-start; background: #1a1a1a; color: #ccc; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .in-area { padding: 10px 15px 30px 15px; background: #080808; }
        .in-box { display: flex; align-items: center; background: #111; padding: 10px 15px; border-radius: 25px; border: 1px solid #bc13fe; }
        #msgIn { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-card">
            <img src="https://files.catbox.moe/fmzx1o.png" class="logo-img" id="adm">
            <h2>INO.DIGITAL <span style="color:#bc13fe">HD</span></h2>
            <div class="tag">AI Photo Restorer</div>
            
            <div class="upload-box">
                <input type="file" id="f" accept="image/*">
                <button id="mainBtn" class="btn-up" onclick="prosesHD()">MULAI PROSES HD</button>
                <div id="prog-cont"><div id="prog-bar"></div></div>
                <div id="prog-txt">PROSES: 0%</div>
                <a id="dlBtn" style="display:none; text-decoration:none;" download>
                    <button class="btn-up btn-dl-final">SIMPAN HASIL KE GALERI</button>
                </a>
            </div>
        </div>
    </div>

    <footer>
        <div class="copy-neon">© 2026 INO.DIGITAL HD</div>
        <div class="footer-links">
            <span class="legal-link" onclick="alert('PRIVACY POLICY:\nFoto dihapus otomatis dalam 24 jam.')">Privacy Policy</span>
            <span class="legal-link" onclick="alert('USAGE PROTOCOL:\nCooldown 30 detik antar proses.')">Usage Protocol</span>
        </div>
    </footer>

    <div class="btn-cs" onclick="openD()">
        <i class="fas fa-comment-dots"></i> SUPPORT
        <div id="notif-dot"></div>
    </div>

    <div id="ov" onclick="closeD()"></div>
    <div id="dw">
        <div class="handle" id="hdl"><div class="line"></div></div>
        <div class="logs" id="lgs"></div>
        <div class="in-area"><div class="in-box"><input type="text" id="msgIn" placeholder="Tulis pesan..." onfocus="goFull()"><button onclick="send()" style="background:none; border:none; color:#bc13fe;"><i class="fas fa-paper-plane"></i></button></div></div>
    </div>

    <script>
        const BOT_TOKEN = "8598427112:AAFLT7lgdu7fzxbgr-Jhr6rSfCjI7hEJM2c"; 
        const ADMIN_ID = "8379816457"; 

        const mainBtn = document.getElementById('mainBtn');
        const dlBtn = document.getElementById('dlBtn');
        const pCont = document.getElementById('prog-cont');
        const pBar = document.getElementById('prog-bar');
        const pTxt = document.getElementById('prog-txt');
        const fIn = document.getElementById('f');

        let myUserID = localStorage.getItem('my_web_id') || "USER-" + Math.floor(Math.random() * 90000);
        localStorage.setItem('my_web_id', myUserID);

        function cekServer() {
            let cf = localStorage.getItem('cf_link');
            if(!cf) {
                mainBtn.innerText = "SERVER ERROR (OFFLINE)";
                mainBtn.style.background = "#ff0000"; 
                mainBtn.disabled = true;
            } else {
                mainBtn.innerText = "MULAI PROSES HD";
                mainBtn.style.background = "#bc13fe";
                mainBtn.disabled = false;
            }
        }
        cekServer();

        async function prosesHD() {
            let cf = localStorage.getItem('cf_link');
            if(!cf || !fIn.files[0]) return alert("Pilih foto dulu bos!");

            mainBtn.disabled = true;
            pCont.style.display = "block";
            pTxt.style.display = "block";

            let p = 0;
            let sim = setInterval(() => {
                if(p < 90) {
                    p += 5;
                    pBar.style.width = p + "%";
                    pTxt.innerText = "MENGIRIM: " + p + "%";
                }
            }, 300);

            const fd = new FormData();
            fd.append('file', fIn.files[0]);

            try {
                const res = await fetch(`${cf}/upload`, { method: 'POST', body: fd });
                const data = await res.json();
                clearInterval(sim);
                pBar.style.width = "100%";
                pTxt.innerText = "MENUNGGU HASIL AI...";

                const check = setInterval(async () => {
                    const resCek = await fetch(`${cf}/check-hd/${data.filename}`);
                    if(resCek.ok) {
                        clearInterval(check);
                        showDownload(`${cf}/static/uploads/HD_${data.filename}`);
                    }
                }, 4000);
            } catch (e) {
                alert("Gagal konek server!");
                cekServer();
            }
        }

        function showDownload(url) {
            pCont.style.display = "none";
            pTxt.style.display = "none";
            mainBtn.style.display = "none";
            dlBtn.style.display = "block";
            dlBtn.href = url;
            setTimeout(() => { dlBtn.style.display = "none"; mainBtn.style.display = "block"; cekServer(); }, 30000);
        }

        // --- CHAT SYSTEM ---
        const dw = document.getElementById('dw');
        const ov = document.getElementById('ov');
        const inp = document.getElementById('msgIn');
        const lgs = document.getElementById('lgs');
        const nDot = document.getElementById('notif-dot');
        let lastId = localStorage.getItem('last_id') || 0;
        let chatH = JSON.parse(localStorage.getItem('chat_h')) || [{ side: 'admin', text: 'Ada kendala? Chat di sini.' }];

        function loadH() {
            lgs.innerHTML = "";
            chatH.forEach(m => { lgs.innerHTML += `<div class="msg ${m.side==='user'?'m-u':'m-a'}">${m.text}</div>`; });
            lgs.scrollTop = lgs.scrollHeight;
        }
        loadH();

        function openD() { dw.classList.add('active'); ov.style.display='block'; nDot.style.display='none'; setTimeout(()=>lgs.scrollTop=lgs.scrollHeight,300); }
        function closeD() { dw.className=''; ov.style.display='none'; }
        function goFull() { dw.classList.remove('active'); dw.classList.add('full'); setTimeout(()=>lgs.scrollTop=lgs.scrollHeight,300); }

        async function send() {
            let t = inp.value.trim(); if(!t) return;
            chatH.push({side:'user', text:t}); loadH(); inp.value="";
            localStorage.setItem('chat_h', JSON.stringify(chatH));
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({chat_id:ADMIN_ID, text:`🆔 *${myUserID}*\n💬: ${t}`, parse_mode:"Markdown"})
            });
        }

        setInterval(async () => {
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${Number(lastId)+1}&timeout=30`);
                const d = await r.json();
                if(d.result.length > 0) {
                    d.result.forEach(i => {
                        lastId = i.update_id; localStorage.setItem('last_id', lastId);
                        if(i.message && i.message.chat.id.toString() === ADMIN_ID) {
                            if(i.message.reply_to_message && i.message.reply_to_message.text.includes(myUserID)) {
                                chatH.push({side:'admin', text:i.message.text});
                                localStorage.setItem('chat_h', JSON.stringify(chatH));
                                loadH();
                                if(!dw.classList.contains('active')) nDot.style.display='block';
                            }
                        }
                    });
                }
            } catch(e){}
        }, 3000);

        // ADMIN HIDDEN TRIGGER
        let clicks = 0;
        document.getElementById('adm').onclick = () => {
            clicks++;
            if(clicks >= 5) {
                let link = prompt("Admin Tunnel URL:");
                if(link) {
                    if(link.endsWith('/')) link = link.slice(0, -1);
                    localStorage.setItem('cf_link', link);
                    location.reload();
                }
                clicks = 0;
            }
            setTimeout(() => clicks = 0, 2000);
        }

        // SLIDE LOGIC
        let sY;
        document.getElementById('hdl').addEventListener('touchstart', e => { sY = e.touches[0].clientY; }, {passive: true});
        document.getElementById('hdl').addEventListener('touchmove', e => {
            let mY = e.touches[0].clientY;
            if (sY - mY > 50) goFull();
            if (mY - sY > 50) {
                if(dw.classList.contains('full')) { dw.classList.remove('full'); dw.classList.add('active'); }
                else closeD();
            }
        }, {passive: true});
    </script>
</body>
                                 </html>
