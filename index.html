<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ino.digital | HD Ultra Boost</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* RESET & BASE */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* BACKGROUND ELEMENTS */
        .video-bg { position: fixed; inset: 0; z-index: -2; background: #000; overflow: hidden; }
        .video-bg video { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .overlay-bg { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, #000 130%); z-index: -1; }
        
        /* MARQUEE TOP */
        .marquee-top { position: fixed; top: 0; left: 0; width: 100%; background: rgba(188, 19, 254, 0.1); backdrop-filter: blur(5px); border-bottom: 1px solid #bc13fe; padding: 5px 0; z-index: 999; }
        .marquee-content { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; font-size: 10px; font-weight: 900; color: #bc13fe; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* MASTER WRAPPER - FIXED CENTER FOR ALL DEVICES */
        .master-wrapper { 
            width: 100%; 
            max-width: 500px; /* Batasan biar gak terlalu lebar di laptop */
            padding: 100px 20px 150px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            text-align: center; 
            z-index: 10; 
            position: relative;
            margin: 0 auto; /* Memaksa center di sumbu X */
        }
        
        .logo-img { width: 85px; height: 85px; border-radius: 50%; border: 3px solid #111; transition: 0.5s; cursor: pointer; margin-bottom: 15px; }
        .upload-box { background: rgba(5, 5, 5, 0.6); border: 1px solid #111; padding: 25px; border-radius: 15px; width: 100%; backdrop-filter: blur(10px); }
        .btn-base { width: 100%; padding: 15px; border-radius: 10px; font-weight: 900; text-transform: uppercase; font-size: 11px; border: 1px solid #111; background: #080808; color: #333; transition: 0.3s; display: block; text-decoration: none; text-align: center; cursor: pointer; }

        .online .logo-img { border-color: #bc13fe !important; box-shadow: 0 0 15px #bc13fe; }
        .online #mainBtn { background: #bc13fe !important; color: #fff !important; border: none; }

        /* PROGRESS & ALERTS */
        #prog-wrapper { width: 100%; display: none; align-items: center; gap: 10px; margin-top: 15px; }
        #prog-cont { flex: 1; height: 14px; background: rgba(255,255,255,0.05); border: 1px solid #222; padding: 2px; border-radius: 4px; overflow: hidden; }
        #prog-bar { width: 0%; height: 100%; background: repeating-linear-gradient(90deg, #bc13fe, #bc13fe 4px, transparent 4px, transparent 6px); transition: 0.3s; }
        #prog-perc { font-size: 10px; font-weight: 900; color: #bc13fe; min-width: 35px; text-align: right; }
        #alert-msg { font-size: 9px; font-weight: 900; color: #ff3333; margin-top: 15px; display: none; text-transform: uppercase; letter-spacing: 1px; }

        /* RESULT IMAGE */
        #fotoHasil { width: 100%; height: auto; max-height: 60vh; object-fit: contain; background: #000; border-radius: 10px; border: 2px solid #bc13fe; box-shadow: 0 0 15px #bc13fe; margin-bottom: 15px; display: block; }

        /* CHAT UI */
        #csBtn { position: fixed; bottom: 30px; right: 20px; width: 55px; height: 55px; border-radius: 50%; background: #bc13fe; color: #fff; display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; box-shadow: 0 0 15px rgba(188, 19, 254, 0.5); }
        #drawer { position: fixed; bottom: 0; left: 50%; width: 100%; max-width: 500px; height: 75vh; background: #080808; border-top: 2px solid #bc13fe; border-radius: 20px 20px 0 0; z-index: 2000; transform: translate(-50%, 100%); transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); display: flex; flex-direction: column; }
        #drawer.open { transform: translate(-50%, 0); }
        .slide-handle { width: 100%; height: 40px; display: flex; justify-content: center; align-items: center; touch-action: none; }
        .handle-bar { width: 40px; height: 5px; background: #333; border-radius: 10px; }
        #chatLogs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 14px; font-size: 12px; max-width: 85%; border-radius: 15px; line-height: 1.4; width: fit-content; word-wrap: break-word; }
        .m-bot { align-self: flex-start; background: #111; color: #ccc; border-radius: 15px 15px 15px 2px; border: 1px solid #222; }
        .m-user { align-self: flex-end; background: #bc13fe; color: #fff; border-radius: 15px 15px 2px 15px; }

        /* ANIMATIONS */
        .wave-text span { display: inline-block; animation: wave-anim 1.5s infinite; animation-delay: calc(.05s * var(--i)); }
        @keyframes wave-anim { 0%, 40%, 100% { transform: translateY(0); } 20% { transform: translateY(-5px); color: #bc13fe; } }
        .typing-bubble { align-self: flex-start; display: none; gap: 4px; padding: 10px 14px; background: #111; border-radius: 15px; border: 1px solid #222; margin-bottom: 5px; }
        .dot { width: 6px; height: 6px; background: #bc13fe; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* ADMIN POPUP */
        #adminPop { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .pop-card { background: #080808; border: 1px solid #bc13fe; padding: 30px; border-radius: 20px; width: 300px; text-align: center; }
        .pop-card input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; margin-bottom: 15px; border-radius: 10px; outline: none; }
        
        footer { width: 100%; padding: 25px; text-align: center; z-index: 10; background: #000; margin-top: auto; }
        .legal-item { font-size: 8px; color: #fff; text-transform: uppercase; font-weight: 700; opacity: 0.4; margin: 0 10px; cursor: pointer; }
    </style>
</head>
<body id="masterBody">

    <div class="marquee-top"><div class="marquee-content">• WELCOME TO INO.DIGITAL HD • UPGRADE YOUR PHOTO QUALITY TO ULTRA HD NOW •</div></div>
    <div class="video-bg"><video autoplay loop muted playsinline><source src="https://files.catbox.moe/o2crck.mp4" type="video/mp4"></video></div>
    <div class="overlay-bg"></div>

    <div class="master-wrapper">
        <img src="https://files.catbox.moe/fmzx1o.png" class="logo-img" id="logoIno">
        <h2 style="font-weight:900; letter-spacing: 2px; margin-bottom: 20px;">INO.DIGITAL HD</h2>
        
        <div class="upload-box">
            <div id="inputArea">
                <button id="pilihBtn" class="btn-base" onclick="document.getElementById('f').click()" style="border-style:dashed; color:#555;">PILIH FOTO</button>
                <input type="file" id="f" hidden onchange="window.hasPhoto=true; showAlert('FOTO SIAP!', '#00ff88');">
                <button id="mainBtn" class="btn-base" onclick="handleProses()" style="margin-top:10px;">OFFLINE</button>
            </div>
            <div id="hasilArea" style="display:none;">
                <img id="fotoHasil" src="">
                <button id="downloadBtn" class="btn-base" style="background:#00ff88; color:#000;">SIMPAN KE GALERY</button>
            </div>
            <div id="prog-wrapper">
                <div id="prog-cont"><div id="prog-bar"></div></div>
                <div id="prog-perc">0%</div>
            </div>
            <div id="alert-msg">NOTIFIKASI</div>
        </div>
    </div>

    <div id="adminPop">
        <div class="pop-card">
            <div id="pwStep">
                <input type="password" id="adminPw" placeholder="PASSWORD">
                <button onclick="checkPw()" style="width:100%; padding:12px; background:#bc13fe; border:none; border-radius:10px; color:#fff; font-weight:900;">MASUK</button>
            </div>
            <div id="linkStep" style="display:none;">
                <input type="text" id="newUrl" placeholder="LINK TUNNEL">
                <button onclick="saveLink()" style="width:100%; padding:12px; background:#00ff88; border:none; border-radius:10px; color:#000; font-weight:900;">SIMPAN</button>
            </div>
        </div>
    </div>

    <div id="csBtn" onclick="toggleChat()"><i class="fas fa-comment-dots"></i></div>
    <div id="drawer">
        <div class="slide-handle" id="dragArea"><div class="handle-bar"></div></div>
        <div id="chatLogs">
            <div class="msg m-bot wave-text" id="greetBox"></div>
            <div id="typIn" class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
        <div style="padding:15px; display:flex; gap:10px; background:#050505; padding-bottom:40px;">
            <input type="text" id="msgIn" placeholder="Tulis..." style="flex:1; background:#111; border:1px solid #222; color:#fff; padding:12px; border-radius:10px; outline:none;">
            <button onclick="sendMsg()" style="background:#bc13fe; border:none; color:#fff; width:45px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <footer>
        <div style="color:#bc13fe; font-size:9px; font-weight:900; margin-bottom:8px;">© 2026 INO.DIGITAL</div>
        <div>
            <span class="legal-item" onclick="showAlert('PRIVACY POLICY ACTIVE', '#bc13fe')">Privacy Policy</span>
            <span class="legal-item" onclick="showAlert('USAGE PROTOCOL ACTIVE', '#bc13fe')">Usage Protocol</span>
        </div>
    </footer>

    <script>
        const BOT_TOKEN = "8598427112:AAFLT7lgdu7fzxbgr-Jhr6rSfCjI7hEJM2c", ADMIN_ID = "8379816457";
        let isSystemOnline = false, lastUpd = 0;

        function setWaveGreeting() {
            const line1 = "Halo, 👋 Ada Yang Bisa Ino.Digital ";
            const line2 = "Bantu?";
            const box = document.getElementById('greetBox');
            const segmenter = new Intl.Segmenter('id', { granularity: 'grapheme' });
            const chars1 = [...segmenter.segment(line1)].map(s => s.segment);
            const html1 = chars1.map((char, i) => `<span style="--i:${i}">${char === " " ? "&nbsp;" : char}</span>`).join("");
            const chars2 = [...segmenter.segment(line2)].map(s => s.segment);
            const html2 = chars2.map((char, i) => `<span style="--i:${chars1.length + i}">${char === " " ? "&nbsp;" : char}</span>`).join("");
            box.innerHTML = `${html1}<br>${html2}`;
        }

        const drawer = document.getElementById('drawer'), dragArea = document.getElementById('dragArea');
        dragArea.ontouchstart = (e) => { startY = e.touches[0].clientY; drawer.style.transition = 'none'; };
        dragArea.ontouchmove = (e) => { currentY = e.touches[0].clientY - startY; if (currentY > 0) drawer.style.transform = `translate(-50%, ${currentY}px)`; };
        dragArea.ontouchend = () => { drawer.style.transition = 'transform 0.4s'; if (currentY > 150) drawer.classList.remove('open'); drawer.style.transform = ''; currentY = 0; };
        
        function toggleChat() { drawer.classList.toggle('open'); if(drawer.classList.contains('open')) setWaveGreeting(); }
        function showAlert(msg, color = "#ff3333") { const a = document.getElementById('alert-msg'); a.innerText = msg; a.style.color = color; a.style.display = 'block'; setTimeout(() => a.style.display = 'none', 3000); }

        let cl = 0;
        document.getElementById('logoIno').onclick = () => { cl++; if(cl>=10) document.getElementById('adminPop').style.display='flex'; setTimeout(()=>cl=0,3000); };
        function checkPw() { if(document.getElementById('adminPw').value === "ino.digital") { document.getElementById('pwStep').style.display='none'; document.getElementById('linkStep').style.display='block'; } }
        function saveLink() { let l = document.getElementById('newUrl').value.trim(); if(l){ if(!l.startsWith('http')) l='https://'+l; localStorage.setItem('master_link', l); location.reload(); } }

        async function cekStatus() {
            const body = document.getElementById('masterBody'), btn = document.getElementById('mainBtn');
            const link = localStorage.getItem('master_link');
            if(!link) return;
            try {
                const res = await fetch(`${link.replace(/\/$/, "")}/`, { method: 'GET', mode: 'cors' });
                if(res.ok) { isSystemOnline = true; body.classList.add('online'); btn.innerText = "PROSES HD"; }
            } catch(e) { isSystemOnline = false; body.classList.remove('online'); btn.innerText = "OFFLINE"; }
        }
        setInterval(cekStatus, 5000); cekStatus();

        async function handleProses() {
            if (!isSystemOnline) return showAlert("OFFLINE");
            if (!window.hasPhoto) return showAlert("PILIH FOTO!");
            const formData = new FormData(); formData.append('foto', document.getElementById('f').files[0]);
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('prog-wrapper').style.display = 'flex';
            let p = 0; const iv = setInterval(() => { p++; if(p >= 95) p = 95; document.getElementById('prog-bar').style.width = p + "%"; document.getElementById('prog-perc').innerText = p + "%"; }, 150);
            try {
                const link = localStorage.getItem('master_link').replace(/\/$/, "");
                const resUpload = await fetch(`${link}/upload`, { method: 'POST', body: formData });
                if(resUpload.ok) {
                    const cekHasil = setInterval(async () => {
                        const urlHasil = `${link}/download/hasil_hd.jpg?t=${new Date().getTime()}`;
                        try {
                            const res = await fetch(urlHasil);
                            if(res.ok && res.headers.get("Content-Type").includes("image")) {
                                clearInterval(cekHasil); clearInterval(iv);
                                document.getElementById('prog-wrapper').style.display = 'none';
                                document.getElementById('hasilArea').style.display = 'block';
                                document.getElementById('fotoHasil').src = urlHasil;
                                const dBtn = document.getElementById('downloadBtn');
                                dBtn.onclick = async () => {
                                    dBtn.innerText = "MENGUNDUH...";
                                    try {
                                        const response = await fetch(urlHasil);
                                        const blob = await response.blob();
                                        const blobUrl = window.URL.createObjectURL(blob);
                                        const a = document.createElement('a'); a.href = blobUrl; a.download = "InoDigital_HD.jpg";
                                        document.body.appendChild(a); a.click(); document.body.removeChild(a); window.URL.revokeObjectURL(blobUrl);
                                        dBtn.innerText = "TERSIMPAN!"; setTimeout(() => dBtn.innerText = "SIMPAN KE GALERY", 3000);
                                    } catch (err) { window.open(urlHasil, '_blank'); }
                                };
                                showAlert("HD SELESAI!", "#00ff88");
                            }
                        } catch(e) {}
                    }, 4000);
                }
            } catch (e) { showAlert("GAGAL KONEKSI"); document.getElementById('inputArea').style.display = 'block'; document.getElementById('prog-wrapper').style.display = 'none'; }
        }

        async function sendMsg() {
            const inp = document.getElementById('msgIn'), logs = document.getElementById('chatLogs');
            if(!inp.value.trim()) return;
            const text = inp.value;
            const uM = document.createElement('div'); uM.className = 'msg m-user'; uM.innerText = text;
            logs.insertBefore(uM, document.getElementById('typIn')); inp.value = ''; logs.scrollTop = logs.scrollHeight;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({chat_id:ADMIN_ID, text: `💬 User:\n${text}`}) });
            setTimeout(() => {
                const sM = document.createElement('div'); sM.className = 'msg m-bot'; sM.innerText = "Pesan Terkirim, Admin Akan Segera Membalas";
                logs.insertBefore(sM, document.getElementById('typIn')); logs.scrollTop = logs.scrollHeight;
            }, 800);
        }

        async function pollAdmin() {
            const link = localStorage.getItem('master_link')?.replace(/\/$/, "");
            if(!link) return;
            try {
                const resTyp = await fetch(`${link}/typing-status`);
                const dataTyp = await resTyp.json();
                document.getElementById('typIn').style.display = dataTyp.typing ? 'flex' : 'none';
                const resUpd = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpd + 1}`);
                const dataUpd = await resUpd.json();
                if (dataUpd.result) {
                    for (let upd of dataUpd.result) {
                        lastUpd = upd.update_id;
                        if (upd.message && upd.message.chat.id == ADMIN_ID) {
                            const bM = document.createElement('div'); bM.className = 'msg m-bot'; bM.innerText = upd.message.text;
                            document.getElementById('chatLogs').insertBefore(bM, document.getElementById('typIn'));
                            document.getElementById('chatLogs').scrollTop = document.getElementById('chatLogs').scrollHeight;
                        }
                    }
                }
            } catch(e) {}
        }
        setInterval(pollAdmin, 2500);
    </script>
</body>
    </html>
