<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ino.digital | HD Ultra Boost</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; position: fixed; }
        
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding-bottom: 140px; }
        .app-card { text-align: center; width: 90%; max-width: 320px; }
        
        /* LOGO & UI STATES */
        .logo-img { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #222; box-shadow: 0 0 10px #111; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .logo-img.online { border-color: #bc13fe; box-shadow: 0 0 20px #bc13fe; }
        h2 { font-weight: 900; letter-spacing: 2px; margin: 0; font-size: 1.3rem; color: #333; transition: 0.3s; }
        h2.online { color: #fff; }
        .tag { color: #222; font-size: 10px; letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase; transition: 0.3s; }
        .tag.online { color: #444; }

        /* BUTTONS */
        .upload-box { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 12px; }
        .btn-up { background: #111; color: #444; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 900; margin-top: 10px; cursor: not-allowed; text-transform: uppercase; transition: 0.4s; font-size: 11px; }
        .btn-up.active-btn { background: #bc13fe !important; color: #fff !important; cursor: pointer !important; box-shadow: 0 0 15px rgba(188,19,254,0.4); }
        .btn-pilih { background: #0a0a0a; border: 1px dashed #222; color: #444; cursor: pointer; margin-bottom: 5px; }
        .btn-pilih.online { border-color: #333; color: #fff; }

        /* PROGRESS */
        #prog-cont { width: 100%; height: 6px; background: #111; border-radius: 10px; margin-top: 15px; display: none; overflow: hidden; }
        #prog-bar { width: 0%; height: 100%; background: #bc13fe; transition: 0.3s; }
        #prog-txt { font-size: 9px; color: #bc13fe; font-weight: 700; margin-top: 8px; display: none; text-transform: uppercase; text-align: center; }

        /* CHAT SUPPORT UI */
        .btn-cs { position: fixed; bottom: 90px; right: 20px; background: #111; color: #333; padding: 12px 20px; border-radius: 50px; font-weight: 900; font-size: 10px; z-index: 50; transition: 0.3s; }
        .btn-cs.online { background: #bc13fe; color: #fff; box-shadow: 0 0 15px rgba(188,19,254,0.4); cursor: pointer; }
        #ov { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; }
        #dw { position: fixed; bottom: 0; left: 0; width: 100%; height: 75vh; background: #080808; border-top: 2px solid #bc13fe; border-radius: 20px 20px 0 0; z-index: 1001; transform: translateY(100%); transition: 0.4s; display: flex; flex-direction: column; }
        #dw.active { transform: translateY(0); }
        .logs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 12px; max-width: 85%; line-height: 1.4; }
        .m-u { align-self: flex-end; background: #bc13fe; color: #fff; border-bottom-right-radius: 2px; }
        .m-a { align-self: flex-start; background: #1a1a1a; color: #ccc; border: 1px solid #333; border-bottom-left-radius: 2px; }

        /* ANIMASI TITIK MENGETIK */
        .typing { display: flex; align-items: center; gap: 4px; padding: 10px 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 15px; border-bottom-left-radius: 2px; width: fit-content; margin-bottom: 5px; align-self: flex-start; }
        .dot { width: 6px; height: 6px; background: #bc13fe; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

        .in-area { padding: 15px 15px 35px 15px; background: #080808; }
        .in-box { display: flex; align-items: center; background: #111; padding: 5px 15px; border-radius: 30px; border: 1px solid #333; }
        #msgIn { flex: 1; background: transparent; border: none; color: #fff; outline: none; }
        
        /* ADMIN POPUP */
        #adminPopup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .pop-card { background: #111; border: 2px solid #bc13fe; padding: 25px; border-radius: 20px; width: 280px; text-align: center; }
        .pop-card input { width: 100%; background: #222; border: 1px solid #333; padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 10px; outline: none; }
        .btn-pop { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; margin-top: 5px; text-transform: uppercase; }

        footer { position: fixed; bottom: 0; width: 100%; padding: 20px; background: #000; text-align: center; border-top: 1px solid #111; }
        .copy-neon { color: #222; font-size: 9px; font-weight: 900; transition: 0.3s; letter-spacing: 2px; }
        .copy-neon.online { color: #bc13fe; }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-card">
            <img src="https://files.catbox.moe/fmzx1o.png" class="logo-img" id="secretLogo">
            <h2 id="mainTitle">INO.DIGITAL <span style="color:#222" id="hdSpan">HD</span></h2>
            <div class="tag" id="tagline">AI Photo Restorer</div>
            
            <div class="upload-box">
                <input type="file" id="f" accept="image/*" style="display:none">
                <button class="btn-up btn-pilih" id="pilihBtn" onclick="document.getElementById('f').click()">
                    <i class="fas fa-image"></i> PILIH FOTO
                </button>
                <button id="mainBtn" class="btn-up" onclick="prosesHD()" disabled>SERVER OFFLINE</button>
                
                <div id="prog-cont"><div id="prog-bar"></div></div>
                <div id="prog-txt">SEDANG MEMPROSES...</div>
                
                <a id="dlBtn" style="display:none; text-decoration:none;" download>
                    <button class="btn-up active-btn" style="background:#00ff88 !important; color:#000 !important;">SIMPAN KE GALERI</button>
                </a>
            </div>
        </div>
    </div>

    <div id="adminPopup">
        <div class="pop-card">
            <h3 style="color:#bc13fe; font-size:12px; margin-bottom:15px">ADMIN LOGIN</h3>
            <div id="stepPassword">
                <input type="password" id="adminPass" placeholder="Password Admin">
                <button class="btn-pop" style="background:#bc13fe; color:#fff" onclick="verifikasiPass()">NEXT</button>
                <button class="btn-pop" style="background:transparent; color:#555" onclick="tutupAdmin()">BATAL</button>
            </div>
            <div id="stepLink" style="display:none">
                <input type="text" id="adminLink" placeholder="https://link.trycloudflare.com">
                <button class="btn-pop" style="background:#bc13fe; color:#fff" onclick="simpanLink()">AKTIFKAN</button>
            </div>
        </div>
    </div>

    <div class="btn-cs" id="csBtn" onclick="openD()"><i class="fas fa-comment-dots"></i> SUPPORT</div>
    <div id="ov" onclick="closeD()"></div>
    <div id="dw">
        <div style="padding:15px; border-bottom:1px solid #111; text-align:center; color:#bc13fe; font-weight:900; font-size:10px">INO SUPPORT REALTIME</div>
        <div class="logs" id="lgs"></div>
        <div class="in-area">
            <div class="in-box">
                <input type="text" id="msgIn" placeholder="Tulis kendala...">
                <button id="sendBtn" onclick="send()" style="background:none; border:none; color:#bc13fe;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <footer><div class="copy-neon" id="footerNeon">© 2026 INO.DIGITAL HD</div></footer>

    <script>
        const PASS_ADMIN = "ino.digital";
        const BOT_TOKEN = "8598427112:AAFLT7lgdu7fzxbgr-Jhr6rSfCjI7hEJM2c";
        const ADMIN_ID = "8379816457";
        
        let MASTER_URL = localStorage.getItem('master_link') || "";
        let myID = localStorage.getItem('ino_userid') || "ID-" + Math.floor(1000+Math.random()*9000);
        localStorage.setItem('ino_userid', myID);

        let isTyping = false;
        let chatH = JSON.parse(localStorage.getItem('chat_ino')) || [];

        // CEK PESAN AWAL (Sambutan)
        if(chatH.length === 0) {
            chatH.push({type:'a', txt: "Halo bos! Ada yang bisa saya bantu terkait proses HD foto?"});
            localStorage.setItem('chat_ino', JSON.stringify(chatH));
        }

        function updateUI(isOnline) {
            const el = {
                btn: document.getElementById('mainBtn'),
                logo: document.getElementById('secretLogo'),
                hd: document.getElementById('hdSpan'),
                title: document.getElementById('mainTitle'),
                footer: document.getElementById('footerNeon'),
                cs: document.getElementById('csBtn'),
                pilih: document.getElementById('pilihBtn'),
                tag: document.getElementById('tagline')
            };
            if(isOnline) {
                el.btn.innerText = "MULAI PROSES HD"; el.btn.classList.add('active-btn'); el.btn.disabled = false;
                el.logo.classList.add('online'); el.title.classList.add('online'); el.hd.style.color = "#bc13fe";
                el.footer.classList.add('online'); el.cs.classList.add('online'); el.pilih.classList.add('online');
                el.tag.classList.add('online');
            } else {
                el.btn.innerText = "SERVER OFFLINE"; el.btn.classList.remove('active-btn'); el.btn.disabled = true;
                el.logo.classList.remove('online'); el.title.classList.remove('online'); el.hd.style.color = "#222";
                el.footer.classList.remove('online'); el.cs.classList.remove('online'); el.pilih.classList.remove('online');
                el.tag.classList.remove('online');
            }
        }

        // CEK SERVER ANTI-OFFLINE (CORS FIXED)
        async function cekServer() {
            if(!MASTER_URL) return updateUI(false);
            let clean = MASTER_URL.replace(/\/$/, "");
            try {
                const res = await fetch(`${clean}/`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                updateUI(res.ok);
            } catch(e) { updateUI(false); }
        }
        setInterval(cekServer, 10000); cekServer();

        // ADMIN PANEL
        let clicks = 0;
        document.getElementById('secretLogo').onclick = () => {
            clicks++; if(clicks >= 10) { document.getElementById('adminPopup').style.display='flex'; clicks=0; }
            setTimeout(()=>clicks=0, 3000);
        };
        function verifikasiPass() {
            if(document.getElementById('adminPass').value === PASS_ADMIN) {
                document.getElementById('stepPassword').style.display='none';
                document.getElementById('stepLink').style.display='block';
            } else { alert("Salah!"); }
        }
        function simpanLink() {
            let l = document.getElementById('adminLink').value.trim();
            if(!l.startsWith("https://")) return alert("Wajib HTTPS!");
            localStorage.setItem('master_link', l); location.reload();
        }
        function tutupAdmin() { document.getElementById('adminPopup').style.display='none'; }

        // PROSES HD
        async function prosesHD() {
            const f = document.getElementById('f'); if(!f.files[0]) return alert("Pilih foto!");
            const b = document.getElementById('mainBtn');
            const clean = MASTER_URL.replace(/\/$/, "");
            
            b.disabled = true; b.classList.remove('active-btn'); b.innerText = "MENGIRIM...";
            document.getElementById('prog-cont').style.display='block';
            document.getElementById('prog-txt').style.display='block';
            document.getElementById('prog-bar').style.width="30%";

            const fd = new FormData(); fd.append('file', f.files[0]);
            try {
                const res = await fetch(`${clean}/upload`, {method:'POST', body:fd});
                const data = await res.json();
                document.getElementById('prog-bar').style.width="100%";
                document.getElementById('prog-txt').innerText = "MENUNGGU HASIL BOT...";
                
                const c = setInterval(async () => {
                    const r = await fetch(`${clean}/check-hd/${data.filename}`);
                    if(r.ok) { 
                        clearInterval(c);
                        document.getElementById('prog-cont').style.display='none';
                        document.getElementById('prog-txt').style.display='none';
                        b.style.display='none';
                        const d = document.getElementById('dlBtn');
                        d.style.display='block'; d.href=`${clean}/static/uploads/HD_${data.filename}`;
                    }
                }, 5000);
            } catch(e) { alert("Gagal!"); location.reload(); }
        }

        // CHAT RENDER + TYPING ANIMATION
        function renderChat() {
            const l = document.getElementById('lgs');
            l.innerHTML = chatH.map(m => `<div class="msg ${m.type==='u'?'m-u':'m-a'}">${m.type==='a'?'<b>SUPPORT:</b><br>':''}${m.txt}</div>`).join('');
            if(isTyping) {
                l.innerHTML += `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            }
            l.scrollTop = l.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('msgIn'); if(!i.value) return;
            const val = i.value; chatH.push({type:'u', txt: val}); renderChat(); i.value = "";
            
            // SIMULASI MENGETIK SETELAH USER CHAT
            setTimeout(() => { isTyping = true; renderChat(); }, 1500);

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({chat_id:ADMIN_ID, text: `🆔 ${myID}\n💬 ${val}`})
            });
            localStorage.setItem('chat_ino', JSON.stringify(chatH));
        }

        // POLLING PESAN DARI TELEGRAM
        setInterval(async () => {
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const d = await r.json();
                if(d.ok) {
                    d.result.forEach(u => {
                        if(u.message && u.message.reply_to_message && u.message.reply_to_message.text.includes(myID)) {
                            const txt = u.message.text;
                            isTyping = false; // Matikan animasi mengetik jika pesan asli masuk
                            if(!chatH.find(m => m.txt === txt && m.type === 'a')) {
                                chatH.push({type:'a', txt: txt}); renderChat();
                                localStorage.setItem('chat_ino', JSON.stringify(chatH));
                            }
                        }
                    });
                }
            } catch(e){}
        }, 3000);

        function openD() { if(!MASTER_URL) return alert("Server Offline!"); document.getElementById('dw').classList.add('active'); document.getElementById('ov').style.display='block'; renderChat(); }
        function closeD() { document.getElementById('dw').classList.remove('active'); document.getElementById('ov').style.display='none'; }
    </script>
</body>
                </html>
