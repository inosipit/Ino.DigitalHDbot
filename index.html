<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Ino.digital | HD Ultra Boost</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Anti-Geter: Mengunci pergerakan browser yang tidak perlu */
        html, body { 
            background: #000; color: #fff; font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; position: fixed; 
            overscroll-behavior-y: none; /* Kunci bounce layar */
        }

        .container { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100%; padding-bottom: 140px; 
        }
        .app-card { text-align: center; width: 90%; max-width: 320px; }
        .logo-img { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #bc13fe; box-shadow: 0 0 20px #bc13fe; margin-bottom: 15px; cursor: pointer; }
        h2 { font-weight: 900; letter-spacing: 2px; margin: 0; font-size: 1.3rem; }
        .tag { color: #444; font-size: 10px; letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase; }

        .upload-box { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 12px; }
        .btn-up { background: #bc13fe; color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 900; margin-top: 10px; cursor: pointer; }

        /* FOOTER */
        footer { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            padding: 20px 0; background: #000; text-align: center; 
            border-top: 1px solid #111; z-index: 100;
        }
        .copy-neon { 
            color: #bc13fe; font-size: 10px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 2px; 
            text-shadow: 0 0 10px rgba(188,19,254,0.3); margin-bottom: 8px;
        }
        .footer-links { display: flex; justify-content: center; gap: 20px; }
        .legal-link { color: #666; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }

        /* SUPPORT PILL */
        .btn-cs { 
            position: fixed; bottom: 90px; right: 20px; 
            background: #bc13fe; color: #fff; padding: 10px 18px; 
            border-radius: 50px; font-weight: 900; font-size: 10px; 
            z-index: 50; box-shadow: 0 5px 15px rgba(188,19,254,0.4); 
        }
        #notif-dot { position: absolute; top: -5px; right: 0; width: 12px; height: 12px; background: red; border-radius: 50%; border: 2px solid #000; display: none; }

        /* CHAT DRAWER FIX */
        #ov { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1000; }
        #dw { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; 
            background: #080808; border-top: 2px solid #bc13fe; border-radius: 20px 20px 0 0; 
            z-index: 1001; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; 
        }
        #dw.active { transform: translateY(45vh); } 
        #dw.full { transform: translateY(0); }

        .handle { width: 100%; height: 35px; display: flex; justify-content: center; align-items: center; cursor: grab; flex-shrink: 0; }
        .line { width: 35px; height: 4px; background: #333; border-radius: 10px; }
        .logs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 12px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .m-u { align-self: flex-end; background: #bc13fe; color: #fff; border-bottom-right-radius: 2px; }
        .m-a { align-self: flex-start; background: #1a1a1a; color: #ccc; border: 1px solid #333; border-bottom-left-radius: 2px; }

        .in-area { padding: 10px 15px 30px 15px; background: #080808; flex-shrink: 0; }
        .in-box { display: flex; align-items: center; background: #111; padding: 10px 15px; border-radius: 25px; border: 1px solid #bc13fe; }
        #msgIn { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-card">
            <img src="https://files.catbox.moe/fmzx1o.png" class="logo-img" id="adm">
            <h2>INO.DIGITAL <span style="color:#bc13fe">HD</span></h2>
            <div class="tag">AI Photo Restorer</div>
            
            <div class="upload-box">
                <input type="file" id="f">
                <button class="btn-up" onclick="alert('Set Cloudflare Link dulu bos!')">MULAI PROSES HD</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="copy-neon">© 2026 INO.DIGITAL HD</div>
        <div class="footer-links">
            <span class="legal-link" onclick="alert('PRIVACY POLICY:\nSemua foto Anda aman dan dihapus otomatis dalam 24 jam.')">Privacy Policy</span>
            <span class="legal-link" onclick="alert('USAGE PROTOCOL:\n- Cooldown 30 detik antar proses.\n- Dilarang upload konten ilegal.\n- Support aktif 24/7.')">Usage Protocol</span>
        </div>
    </footer>

    <div class="btn-cs" onclick="openD()">
        <i class="fas fa-comment-dots"></i> SUPPORT
        <div id="notif-dot"></div>
    </div>

    <div id="ov" onclick="closeD()"></div>
    
    <div id="dw">
        <div class="handle" id="hdl"><div class="line"></div></div>
        <div class="logs" id="lgs"></div>
        <div class="in-area">
            <div class="in-box">
                <input type="text" id="msgIn" placeholder="Tulis pesan..." onfocus="goFull()">
                <button onclick="send()" style="background:none; border:none; color:#bc13fe; font-size:18px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8598427112:AAFLT7lgdu7fzxbgr-Jhr6rSfCjI7hEJM2c"; 
        const ADMIN_ID = "8379816457"; 

        let myUserID = localStorage.getItem('my_web_id') || "USER-" + Math.floor(Math.random() * 90000);
        localStorage.setItem('my_web_id', myUserID);

        const dw = document.getElementById('dw');
        const ov = document.getElementById('ov');
        const inp = document.getElementById('msgIn');
        const lgs = document.getElementById('lgs');
        const nDot = document.getElementById('notif-dot');

        let lastUpdateId = localStorage.getItem('last_update_id') || 0;
        let chatHistory = JSON.parse(localStorage.getItem('chat_history')) || [{ side: 'admin', text: 'Halo bos! Ada kendala? Langsung ketik di bawah.' }];

        function loadChat() {
            lgs.innerHTML = "";
            chatHistory.forEach(m => {
                const cls = m.side === 'user' ? 'm-u' : 'm-a';
                lgs.innerHTML += `<div class="msg ${cls}">${m.text}</div>`;
            });
            lgs.scrollTop = lgs.scrollHeight;
        }
        loadChat();

        function openD() { dw.classList.add('active'); ov.style.display='block'; nDot.style.display='none'; setTimeout(() => { lgs.scrollTop = lgs.scrollHeight; }, 300); }
        function closeD() { dw.className=''; ov.style.display='none'; inp.blur(); }
        
        // Anti-Geter Focus Logic
        function goFull() { 
            // Naikkan drawer duluan baru kasih waktu buat keyboard muncul
            dw.classList.remove('active'); 
            dw.classList.add('full'); 
            setTimeout(() => {
                lgs.scrollTop = lgs.scrollHeight;
            }, 300);
        }

        async function send() {
            const txt = inp.value.trim();
            if(!txt) return;
            chatHistory.push({ side: 'user', text: txt });
            localStorage.setItem('chat_history', JSON.stringify(chatHistory));
            loadChat();
            inp.value = "";
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ADMIN_ID, text: `🆔 *${myUserID}*\n💬 Pesan: ${txt}`, parse_mode: "Markdown" })
                });
            } catch (e) { }
        }

        async function cekBalasan() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${Number(lastUpdateId) + 1}&timeout=30`);
                const data = await res.json();
                if (data.result && data.result.length > 0) {
                    data.result.forEach(item => {
                        lastUpdateId = item.update_id;
                        localStorage.setItem('last_update_id', lastUpdateId);
                        if (item.message && item.message.chat.id.toString() === ADMIN_ID) {
                            const replyTo = item.message.reply_to_message;
                            if (replyTo && replyTo.text.includes(myUserID)) {
                                chatHistory.push({ side: 'admin', text: item.message.text });
                                localStorage.setItem('chat_history', JSON.stringify(chatHistory));
                                loadChat();
                                if (!dw.classList.contains('active') && !dw.classList.contains('full')) {
                                    nDot.style.display = 'block';
                                }
                            }
                        }
                    });
                }
            } catch (e) { }
        }
        setInterval(cekBalasan, 3000);

        // Slide Handle Touch
        let startY;
        document.getElementById('hdl').addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, {passive: true});
        document.getElementById('hdl').addEventListener('touchmove', e => {
            let moveY = e.touches[0].clientY;
            if (startY - moveY > 50) goFull();
            if (moveY - startY > 50) {
                if(dw.classList.contains('full')) { dw.classList.remove('full'); dw.classList.add('active'); }
                else closeD();
            }
        }, {passive: true});

        // Admin Prompt
        let click = 0;
        document.getElementById('adm').onclick = () => {
            click++;
            if(click >= 5) {
                let link = prompt("Set Cloudflare Link:");
                if(link) localStorage.setItem('cf_link', link);
                click = 0;
            }
            setTimeout(() => click = 0, 2000);
        }
    </script>
</body>
  </html>
